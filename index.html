<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Smash or Pass 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg:         #07071A;
  --surface:    #0F0F28;
  --card:       #161635;
  --border:     #1E1E48;
  --pink:       #FF1E5A;
  --pink-glow:  rgba(255,30,90,.28);
  --purple:     #9B52FF;
  --text:       #F0ECFF;
  --muted:      #5A5A88;
  --r:          18px;
  --r-sm:       12px;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── SCREENS ── */
.scr {
  display: none;
  width: 100%;
  height: 100%;
  flex-direction: column;
  overflow: hidden;
}
.scr.on { display: flex; }


/* ══════════════════════════════════
   SCREEN: LOGIN
══════════════════════════════════ */
#s-login {
  align-items: center;
  justify-content: center;
  padding: 36px 28px 48px;
  gap: 0;
  background: radial-gradient(ellipse 90% 55% at 50% 105%,
    rgba(155,82,255,.18) 0%, transparent 70%);
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  line-height: .9;
  text-align: center;
  letter-spacing: -0.03em;
  font-size: clamp(3rem, 10vw, 4rem);
  margin-bottom: 10px;
}
.logo .s { color: var(--pink); display: block; }
.logo .p { color: var(--purple); display: block; }

.tagline {
  color: var(--muted);
  font-size: .9rem;
  text-align: center;
  margin-bottom: 44px;
  margin-top: 4px;
}

.field { width: 100%; margin-bottom: 10px; }
.field label {
  display: block;
  font-size: .75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.field input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 1.1rem;
  padding: 14px 18px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px var(--pink-glow);
}
.field input::placeholder { color: var(--muted); }

.err-msg {
  color: var(--pink);
  font-size: .85rem;
  min-height: 22px;
  text-align: center;
  margin-bottom: 10px;
  line-height: 1.4;
}

.btn-main {
  width: 100%;
  background: var(--pink);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  padding: 16px;
  cursor: pointer;
  letter-spacing: .03em;
  transition: box-shadow .2s, transform .1s, opacity .2s;
}
.btn-main:active   { transform: scale(.97); }
.btn-main:hover    { box-shadow: 0 8px 28px var(--pink-glow); }
.btn-main:disabled { opacity: .45; cursor: default; box-shadow: none; transform: none; }


/* ══════════════════════════════════
   SCREEN: LOADING
══════════════════════════════════ */
#s-loading {
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.load-icon {
  font-size: 3.6rem;
  animation: bob .75s ease-in-out infinite alternate;
}
@keyframes bob {
  from { transform: translateY(0); }
  to   { transform: translateY(-14px); }
}
.load-text { color: var(--muted); font-size: .95rem; }


/* ══════════════════════════════════
   SCREEN: GAME
══════════════════════════════════ */
#s-game { padding: 0; }

.game-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 10px;
  flex-shrink: 0;
}
.gm-who { font-size: .8rem; color: var(--muted); }
.gm-who b { color: var(--text); }
.gm-count {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: .88rem;
  color: var(--pink);
}

.prog { height: 2px; background: var(--border); flex-shrink: 0; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--purple));
  transition: width .4s ease;
}

/* Card zone */
.card-zone {
  flex: 1;
  min-height: 0;
  padding: 12px 14px 8px;
  position: relative;
}

.celeb-card {
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  background: var(--card);
  cursor: grab;
  user-select: none;
  touch-action: none;
  will-change: transform, opacity;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
}
.celeb-card.exit-r {
  transition: transform .34s cubic-bezier(.4,0,1,1), opacity .3s;
  transform: translateX(130%) rotate(14deg) !important;
  opacity: 0;
}
.celeb-card.exit-l {
  transition: transform .34s cubic-bezier(.4,0,1,1), opacity .3s;
  transform: translateX(-130%) rotate(-14deg) !important;
  opacity: 0;
}
.celeb-card.enter {
  animation: cardIn .32s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes cardIn {
  from { transform: scale(.88) translateY(24px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.celeb-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  pointer-events: none;
}
.celeb-fb {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 5rem;
  color: var(--border);
  background: linear-gradient(145deg, var(--card), var(--surface));
}

.celeb-name-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 64px 20px 20px;
  background: linear-gradient(transparent, rgba(3,3,14,.96));
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.4rem;
  letter-spacing: -0.01em;
  pointer-events: none;
}

/* Swipe hint labels */
.hint {
  position: absolute;
  top: 20px;
  padding: 7px 14px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: .04em;
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  transition: opacity .08s;
}
.hint-smash { right: 16px; background: var(--pink);   color: #fff; transform: rotate(8deg); }
.hint-pass  { left:  16px; background: var(--border);  color: var(--text); transform: rotate(-8deg); }

/* Emoji pop on vote */
.vote-pop {
  position: absolute;
  top: 46%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 6.5rem;
  pointer-events: none;
  z-index: 10;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,.6));
}
.vote-pop.boom {
  animation: boomPop .62s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes boomPop {
  0%   { transform: translate(-50%,-50%) scale(0)   rotate(-22deg); opacity: 1; }
  50%  { transform: translate(-50%,-50%) scale(1.15) rotate(6deg);  opacity: 1; }
  80%  { transform: translate(-50%,-50%) scale(.95) rotate(0deg);  opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(.7)  rotate(-4deg); opacity: 0; }
}

/* Vote buttons */
.vote-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 14px 26px;
  flex-shrink: 0;
}
.vbtn {
  border: none;
  border-radius: 16px;
  padding: 16px 0 18px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: .92rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  letter-spacing: .03em;
  transition: transform .12s, box-shadow .2s, opacity .2s;
}
.vbtn:active  { transform: scale(.94); }
.vbtn:disabled { opacity: .4; cursor: default; }
.vbtn .ico { font-size: 1.9rem; }

.pass-btn {
  background: var(--surface);
  color: var(--muted);
  border: 1.5px solid var(--border);
}
.pass-btn:hover { background: var(--card); }

.smash-btn {
  background: var(--pink);
  color: #fff;
}
.smash-btn:hover { box-shadow: 0 8px 28px var(--pink-glow); }


/* ══════════════════════════════════
   SCREEN: RESULTS
══════════════════════════════════ */
#s-results { overflow: hidden; }

.res-head {
  padding: 22px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.res-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.45rem;
  margin-bottom: 3px;
}
.res-date { color: var(--muted); font-size: .78rem; }

.legend {
  display: flex;
  gap: 14px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.legend::-webkit-scrollbar { display: none; }
.leg-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .8rem;
  color: var(--muted);
  white-space: nowrap;
}
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: .7rem;
  flex-shrink: 0;
}

.res-list {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.res-list::-webkit-scrollbar { width: 4px; }
.res-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.res-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
}
.res-thumb {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  object-position: top;
  flex-shrink: 0;
}
.res-thumb-ph {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--muted);
  font-size: .95rem;
  flex-shrink: 0;
}
.res-name {
  flex: 1;
  font-size: .88rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.res-votes { display: flex; gap: 4px; flex-shrink: 0; }
.rv { font-size: 1.25rem; }

.stats-area {
  padding: 8px 12px 4px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.stat-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.5;
}
.stat-pill b { color: var(--text); }

.res-actions {
  display: flex;
  gap: 8px;
  padding: 10px 12px 24px;
  flex-shrink: 0;
}
.btn-ghost {
  flex: 1;
  background: var(--surface);
  color: var(--muted);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  padding: 13px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.btn-ghost:hover { border-color: var(--muted); color: var(--text); }
</style>
</head>
<body>
<div id="app">

  <!-- ─── LOGIN ─── -->
  <section class="scr on" id="s-login">
    <h1 class="logo">
      <span class="s">SMASH</span>
      <span class="p">OR PASS</span>
    </h1>
    <p class="tagline">El juego más honesto del grupo 👀</p>
    <div class="field">
      <label for="name-inp">¿Cómo te llamas?</label>
      <input id="name-inp" type="text" placeholder="Tu nombre..."
             autocomplete="off" autocapitalize="words" spellcheck="false">
    </div>
    <p class="err-msg" id="login-err"></p>
    <button class="btn-main" id="login-btn">Entrar 🚀</button>
  </section>

  <!-- ─── LOADING ─── -->
  <section class="scr" id="s-loading">
    <div class="load-icon" id="load-icon">✨</div>
    <p class="load-text" id="load-text">Un momento...</p>
  </section>

  <!-- ─── GAME ─── -->
  <section class="scr" id="s-game">
    <div class="game-bar">
      <span class="gm-who">Jugando como <b id="gm-user"></b></span>
      <span class="gm-count" id="gm-count">1 / ?</span>
    </div>
    <div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div class="card-zone">
      <div class="celeb-card" id="celeb-card">
        <div class="celeb-fb" id="celeb-fb">?</div>
        <img class="celeb-img" id="celeb-img" src="" alt="" style="display:none">
        <div class="celeb-name-bar" id="celeb-name"></div>
        <div class="vote-pop" id="vote-pop"></div>
        <div class="hint hint-smash" id="hint-smash">🔥 SMASH</div>
        <div class="hint hint-pass"  id="hint-pass">PASS 💀</div>
      </div>
    </div>

    <div class="vote-btns">
      <button class="vbtn pass-btn"  id="btn-pass">
        <span class="ico">💀</span>PASS
      </button>
      <button class="vbtn smash-btn" id="btn-smash">
        <span class="ico">🔥</span>SMASH
      </button>
    </div>
  </section>

  <!-- ─── RESULTS ─── -->
  <section class="scr" id="s-results">
    <div class="res-head">
      <h2 class="res-title">📊 Resultados</h2>
      <p class="res-date" id="res-date"></p>
    </div>
    <div class="legend" id="res-legend"></div>
    <div class="res-list"  id="res-list"></div>
    <div class="stats-area" id="res-stats"></div>
    <div class="res-actions">
      <button class="btn-ghost" id="btn-refresh">🔄 Actualizar</button>
      <button class="btn-main" style="flex:1" id="btn-home">🏠 Inicio</button>
    </div>
  </section>

</div><!-- #app -->

<script>
/* ══════════════════════════════════════════════
   CONFIG — cambia esta URL por la tuya
══════════════════════════════════════════════ */
const API = 'https://script.google.com/macros/s/AKfycbyLHlN9cwl8-YGR7xKi143tn7tg2a9BaoZy7OfVB9nZsgDqXcibVlnnzNlO1_zQN7Sq/exec';

const COLORS = ['#FF1E5A','#9B52FF','#00C6FF','#FFB800','#00D68F'];

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const S = {
  user:     null,
  allUsers: [],
  celebs:   [],
  idx:      0,
  votes:    {},   // { celebName: 'smash'|'pass' }
  round:    getRound(),
  busy:     false
};

function getRound() {
  const p = new URLSearchParams(location.search);
  return p.get('round') || new Date().toISOString().slice(0, 10);
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

function go(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function setLoad(icon, text) {
  document.getElementById('load-icon').textContent = icon;
  document.getElementById('load-text').textContent = text;
}

/* ══════════════════════════════════════════════
   API
══════════════════════════════════════════════ */
async function apiGet(params) {
  const url = new URL(API);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
  const res = await fetch(url.toString());
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function wikiImg(name) {
  try {
    const slug = encodeURIComponent(name.trim().replace(/ /g, '_'));
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${slug}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.thumbnail?.source ?? null;
  } catch { return null; }
}

/* ══════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════ */
const loginBtn  = document.getElementById('login-btn');
const nameInp   = document.getElementById('name-inp');
const loginErr  = document.getElementById('login-err');

loginBtn.addEventListener('click', doLogin);
nameInp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const name = nameInp.value.trim();
  if (!name) { loginErr.textContent = '¡Escribe tu nombre!'; return; }

  loginErr.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Un momento...';

  go('s-loading');
  setLoad('🔍', 'Comprobando tu nombre...');

  try {
    const { users } = await apiGet({ action: 'getUsers' });
    S.allUsers = users;
    const match = users.find(u => u.toLowerCase() === name.toLowerCase());

    if (!match) {
      go('s-login');
      loginErr.textContent = '❌ Tu nombre no está en la lista. Dile al admin que te añada.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar 🚀';
      return;
    }

    S.user = match;
    await loadGame();

  } catch (e) {
    go('s-login');
    loginErr.textContent = '⚠️ Error de conexión. Inténtalo de nuevo.';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Entrar 🚀';
    console.error(e);
  }
}

/* ══════════════════════════════════════════════
   GAME SETUP
══════════════════════════════════════════════ */
async function loadGame() {
  go('s-loading');
  setLoad('🌟', 'Cargando celebridades...');

  const { celebrities } = await apiGet({ action: 'getCelebrities' });
  if (!celebrities.length) {
    go('s-login');
    loginErr.textContent = '⚠️ No hay celebridades en el Google Sheet aún.';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Entrar 🚀';
    return;
  }

  setLoad('🖼️', 'Buscando fotos...');

  const withImg = await Promise.all(
    celebrities.map(async c => ({
      ...c,
      image: c.image || await wikiImg(c.name) || null
    }))
  );
  S.celebs = withImg;

  // Load existing votes for this round
  try {
    const { votes } = await apiGet({ action: 'getVotes', round: S.round });
    votes
      .filter(v => v.username.toLowerCase() === S.user.toLowerCase())
      .forEach(v => { S.votes[v.celebrity] = v.vote; });
  } catch {}

  // Find first un-voted celeb
  S.idx = S.celebs.findIndex(c => !S.votes[c.name]);

  if (S.idx === -1) {
    await showResults();
  } else {
    document.getElementById('gm-user').textContent = S.user;
    go('s-game');
    renderCard(false);
    S.busy = false;
  }
}

/* ══════════════════════════════════════════════
   GAME: CARD RENDERING
══════════════════════════════════════════════ */
function renderCard(animate = true) {
  const c     = S.celebs[S.idx];
  const total = S.celebs.length;
  const n     = S.idx + 1;

  document.getElementById('gm-count').textContent = `${n} / ${total}`;
  document.getElementById('prog-fill').style.width = `${(n / total) * 100}%`;
  document.getElementById('celeb-name').textContent = c.name;

  const img = document.getElementById('celeb-img');
  const fb  = document.getElementById('celeb-fb');

  if (c.image) {
    img.src = c.image;
    img.style.display = 'block';
    fb.style.display  = 'none';
    img.onerror = () => {
      img.style.display = 'none';
      fb.style.display  = 'flex';
      fb.textContent    = c.name[0].toUpperCase();
    };
  } else {
    img.style.display = 'none';
    fb.style.display  = 'flex';
    fb.textContent    = c.name[0].toUpperCase();
  }

  if (animate) {
    const card = document.getElementById('celeb-card');
    card.classList.remove('enter');
    void card.offsetWidth;
    card.classList.add('enter');
  }
}

/* ══════════════════════════════════════════════
   GAME: VOTE
══════════════════════════════════════════════ */
document.getElementById('btn-smash').addEventListener('click', () => castVote('smash'));
document.getElementById('btn-pass').addEventListener('click',  () => castVote('pass'));

async function castVote(choice) {
  if (S.busy) return;
  S.busy = true;

  // Disable buttons
  document.getElementById('btn-smash').disabled = true;
  document.getElementById('btn-pass').disabled  = true;

  const celeb = S.celebs[S.idx];

  // Show pop emoji
  const pop = document.getElementById('vote-pop');
  pop.textContent = choice === 'smash' ? '🔥' : '💀';
  pop.classList.remove('boom');
  void pop.offsetWidth;
  pop.classList.add('boom');

  // Save locally & send to API (fire & forget)
  S.votes[celeb.name] = choice;
  apiGet({ action: 'submitVote', round: S.round,
           celebrity: celeb.name, username: S.user, vote: choice })
    .catch(console.error);

  // Exit animation
  await sleep(260);
  const card = document.getElementById('celeb-card');
  card.classList.add(choice === 'smash' ? 'exit-r' : 'exit-l');
  await sleep(320);
  card.classList.remove('exit-r', 'exit-l');

  S.idx++;
  if (S.idx >= S.celebs.length) {
    await showResults();
    return;
  }

  renderCard(true);

  await sleep(350);
  document.getElementById('btn-smash').disabled = false;
  document.getElementById('btn-pass').disabled  = false;
  S.busy = false;
}

/* ══════════════════════════════════════════════
   GAME: SWIPE GESTURE
══════════════════════════════════════════════ */
let tx0 = null;
const cardEl     = document.getElementById('celeb-card');
const hSmash     = document.getElementById('hint-smash');
const hPass      = document.getElementById('hint-pass');

cardEl.addEventListener('touchstart', e => {
  if (S.busy) return;
  tx0 = e.touches[0].clientX;
}, { passive: true });

cardEl.addEventListener('touchmove', e => {
  if (tx0 === null || S.busy) return;
  const dx  = e.touches[0].clientX - tx0;
  const rot = dx / 20;
  cardEl.style.transform = `translateX(${dx * 0.38}px) rotate(${rot}deg)`;
  const t = Math.min(Math.abs(dx) / 75, 1);
  if (dx > 0) { hSmash.style.opacity = t; hPass.style.opacity = 0; }
  else         { hPass.style.opacity  = t; hSmash.style.opacity = 0; }
}, { passive: true });

function resetSwipe() {
  tx0 = null;
  cardEl.style.transition = 'transform .22s ease';
  cardEl.style.transform  = '';
  hSmash.style.opacity = hPass.style.opacity = 0;
  setTimeout(() => { cardEl.style.transition = ''; }, 230);
}

cardEl.addEventListener('touchend', e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  tx0 = null;
  hSmash.style.opacity = hPass.style.opacity = 0;
  if (Math.abs(dx) > 75) {
    cardEl.style.transform = '';
    castVote(dx > 0 ? 'smash' : 'pass');
  } else {
    resetSwipe();
  }
}, { passive: true });

cardEl.addEventListener('touchcancel', resetSwipe, { passive: true });

/* ══════════════════════════════════════════════
   RESULTS
══════════════════════════════════════════════ */
document.getElementById('btn-refresh').addEventListener('click', renderResults);
document.getElementById('btn-home').addEventListener('click', () => {
  S.user = null; S.votes = {}; S.idx = 0;
  nameInp.value = ''; loginErr.textContent = '';
  loginBtn.disabled = false; loginBtn.textContent = 'Entrar 🚀';
  go('s-login');
});

async function showResults() {
  go('s-results');
  const d = new Date().toLocaleDateString('es-ES', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  document.getElementById('res-date').textContent = `${d} · Ronda: ${S.round}`;
  await renderResults();
}

async function renderResults() {
  const listEl   = document.getElementById('res-list');
  const legendEl = document.getElementById('res-legend');
  const statsEl  = document.getElementById('res-stats');

  listEl.innerHTML = '<div style="text-align:center;padding:28px;color:var(--muted)">Cargando...</div>';

  try {
    const { votes } = await apiGet({ action: 'getVotes', round: S.round });

    // Determine display order from allUsers, fallback to voters
    const voterSet    = new Set(votes.map(v => v.username.toLowerCase()));
    const displayUsers = S.allUsers.length ? S.allUsers : [...new Set(votes.map(v => v.username))];

    // Legend
    legendEl.innerHTML = displayUsers.map((u, i) => `
      <div class="leg-item">
        <div class="avatar"
             style="background:${COLORS[i%COLORS.length]}22;color:${COLORS[i%COLORS.length]}">
          ${u[0].toUpperCase()}
        </div>
        ${u}
      </div>`).join('');

    // Group votes by celeb (lowercase username key for safe lookup)
    const byName = {};
    votes.forEach(v => {
      if (!byName[v.celebrity]) byName[v.celebrity] = {};
      byName[v.celebrity][v.username.toLowerCase()] = v.vote;
    });

    // Rows
    listEl.innerHTML = S.celebs.map(c => {
      const cv      = byName[c.name] || {};
      const vHtml   = displayUsers.map(u => {
        const v = cv[u.toLowerCase()];
        return `<span class="rv" title="${u}">${!v ? '❓' : v === 'smash' ? '🔥' : '💀'}</span>`;
      }).join('');

      const thumb = c.image
        ? `<img class="res-thumb" src="${c.image}" alt="${c.name}" onerror="this.outerHTML='<div class=res-thumb-ph>${c.name[0]}</div>'">`
        : `<div class="res-thumb-ph">${c.name[0].toUpperCase()}</div>`;

      return `
        <div class="res-row">
          ${thumb}
          <span class="res-name">${c.name}</span>
          <div class="res-votes">${vHtml}</div>
        </div>`;
    }).join('');

    // Stats
    const smashAll   = [];
    const passAll    = [];
    const polemic    = [];
    const notDone    = [];

    displayUsers.forEach(u => {
      const n = votes.filter(v => v.username.toLowerCase() === u.toLowerCase()).length;
      if (n < S.celebs.length) notDone.push(u);
    });

    S.celebs.forEach(c => {
      const cv = byName[c.name] || {};
      const vs = displayUsers.map(u => cv[u.toLowerCase()]).filter(Boolean);
      if (vs.length === displayUsers.length) {
        if (new Set(vs).size === 1) {
          vs[0] === 'smash' ? smashAll.push(c.name) : passAll.push(c.name);
        } else {
          polemic.push(c.name);
        }
      }
    });

    let stats = '';
    if (smashAll.length) stats += `<div class="stat-pill">🔥🔥🔥 <b>Triple smash:</b> ${smashAll.join(', ')}</div>`;
    if (passAll.length)  stats += `<div class="stat-pill">💀 <b>Todas pass:</b> ${passAll.join(', ')}</div>`;
    if (polemic.length)  stats += `<div class="stat-pill">🌶️ <b>Más polémicos:</b> ${polemic.join(', ')}</div>`;
    if (notDone.length)  stats += `<div class="stat-pill">⏳ <b>Aún votando:</b> ${notDone.join(', ')}</div>`;

    statsEl.innerHTML = stats;

  } catch (e) {
    listEl.innerHTML = `<div style="text-align:center;padding:28px;color:var(--pink)">Error: ${e.message}</div>`;
  }
}
</script>
</body>
