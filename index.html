<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagnóstico M1</title>
<style>
  body{font-family:monospace;background:#111;color:#eee;padding:20px;}
  h1{color:#ffae00;}
  .row{border:1px solid #444;margin:10px 0;padding:10px;border-radius:6px;}
  .ok{border-color:#2ecc71;}
  .bad{border-color:#e74c3c;}
  .label{color:#888;}
  textarea{width:100%;height:80px;background:#000;color:#0f0;font-size:11px;}
  input{width:300px;padding:6px;font-size:14px;}
  button{padding:8px 16px;font-size:14px;cursor:pointer;}
  pre{white-space:pre-wrap;word-break:break-all;background:#000;padding:8px;border-radius:4px;font-size:11px;max-height:200px;overflow:auto;}
</style>
</head>
<body>
<h1>🔍 Diagnóstico de datos del formulario</h1>
<p>Busca un nombre (ej. "Natalia") y presiona Buscar. Esto descarga el CSV REAL de Google Sheets en este momento (sin caché) y muestra exactamente lo que contiene.</p>
<input id="nameInput" placeholder="Nombre a buscar..." value="Natalia">
<button onclick="buscar()">Buscar</button>
<div id="resultado"></div>

<script>
const SID = '1Lxz_7Hf20m685XGDQQmNFL0IclDY8RzK0IXIo0jnZg4';
const GID_DATOS = '0';

function csvUrl(sid, gid) {
  return `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&gid=${gid}&_=${Date.now()}`;
}

// Parser robusto (carácter por carácter, respeta comillas con saltos de línea)
function parseCSV(txt) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  const len = txt.length;
  while (i < len) {
    const c = txt[i];
    if (inQuotes) {
      if (c === '"') {
        if (txt[i+1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    } else {
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ',') { row.push(field.trim()); field = ''; i++; continue; }
      if (c === '\r') { i++; continue; }
      if (c === '\n') {
        row.push(field.trim()); field = '';
        if (!(row.length === 1 && row[0] === '')) rows.push(row);
        row = []; i++; continue;
      }
      field += c; i++; continue;
    }
  }
  if (field !== '' || row.length) {
    row.push(field.trim());
    if (!(row.length === 1 && row[0] === '')) rows.push(row);
  }
  return rows.filter(r => r.some(cell => cell !== ''));
}

async function buscar() {
  const nombreBuscado = document.getElementById('nameInput').value.trim().toLowerCase();
  const div = document.getElementById('resultado');
  div.innerHTML = '<p>Descargando CSV en vivo...</p>';

  let text;
  try {
    const r = await fetch(csvUrl(SID, GID_DATOS), {cache: 'no-store'});
    text = await r.text();
  } catch (e) {
    div.innerHTML = '<p style="color:red">Error al descargar: ' + e.message + '</p>';
    return;
  }

  const rows = parseCSV(text);
  const headers = rows[0];

  // localizar columna Nombre
  let nameIdx = 1;
  for (let i = 0; i < headers.length; i++) {
    if (headers[i].toLowerCase().includes('nombre') || headers[i].toLowerCase().includes('participante')) nameIdx = i;
  }
  // localizar columna M1
  let m1Idx = -1;
  for (let i = 0; i < headers.length; i++) {
    if (headers[i].trim() === 'M1') { m1Idx = i; break; }
  }

  let html = `<p><b>Total filas leídas:</b> ${rows.length-1} (sin contar header)</p>`;
  html += `<p><b>Total columnas en header:</b> ${headers.length}</p>`;
  html += `<p><b>Índice columna Nombre:</b> ${nameIdx} &nbsp; <b>Índice columna M1:</b> ${m1Idx}</p>`;
  if (m1Idx === -1) {
    html += `<p style="color:#e74c3c">⚠️ NO se encontró ninguna columna cuyo header sea exactamente "M1". Headers cercanos: ${JSON.stringify(headers.slice(Math.max(0,28),36))}</p>`;
  } else {
    html += `<p>Header real en esa columna: <code>${JSON.stringify(headers[m1Idx])}</code></p>`;
  }

  html += '<hr><h3>Filas que coinciden con "' + nombreBuscado + '"</h3>';
  let found = 0;
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const rawName = row[nameIdx] || '';
    if (rawName.toLowerCase().includes(nombreBuscado)) {
      found++;
      const m1val = m1Idx !== -1 ? row[m1Idx] : '(columna M1 no encontrada)';
      const ok = m1val && m1val.trim() !== '';
      html += `<div class="row ${ok ? 'ok' : 'bad'}">
        <div><span class="label">Fila #${i+1} del sheet</span></div>
        <div><b>Nombre crudo:</b> "${rawName}" (${rawName.length} caracteres)</div>
        <div><b>Cantidad de columnas en esta fila:</b> ${row.length} (header tiene ${headers.length})</div>
        <div><b>Valor en columna M1:</b> "${m1val}" → ${ok ? '✅ TIENE DATO' : '❌ VACÍO'}</div>
        <div class="label">Fila completa (array):</div>
        <pre>${JSON.stringify(row)}</pre>
      </div>`;
    }
  }
  if (found === 0) {
    html += `<p style="color:#e74c3c">No se encontró ninguna fila con ese nombre.</p>`;
  }

  div.innerHTML = html;
}

buscar();
</script>
</body>
</html>
